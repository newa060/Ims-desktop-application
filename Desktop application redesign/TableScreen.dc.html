<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>

<div style="font-family:'Inter',sans-serif;color:#1c1c1a">

  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:28px">
    <div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;letter-spacing:-0.01em;line-height:1.1">{{title}}</div>
      <div style="font-size:14.5px;color:rgba(28,28,26,0.55);margin-top:6px">{{subtitle}}</div>
    </div>
    <sc-if value="{{hasAdd}}" hint-placeholder-val="{{false}}">
      <div style="flex:none;background:#1c1c1a;color:#f5f3ec;font-size:13.5px;font-weight:600;padding:12px 20px;border-radius:10px;cursor:pointer;white-space:nowrap" style-hover="background:#31312d">+ {{addLabel}}</div>
    </sc-if>
  </div>

  <sc-if value="{{hasKpis}}" hint-placeholder-val="{{false}}">
    <div style="display:grid;grid-template-columns:repeat({{kpiCount}},1fr);gap:16px;margin-bottom:20px">
      <sc-for list="{{kpis}}" as="k" hint-placeholder-count="4">
        <div style="background:#ffffff;border:1px solid rgba(28,28,26,0.08);border-radius:16px;padding:22px 24px">
          <div style="font-size:13px;color:rgba(28,28,26,0.55);font-weight:500;margin-bottom:10px">{{k.label}}</div>
          <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:{{k.color}}">{{k.value}}</div>
        </div>
      </sc-for>
    </div>
  </sc-if>

  <div style="background:#ffffff;border:1px solid rgba(28,28,26,0.08);border-radius:16px;padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:14px">
    <div style="flex:1;display:flex;align-items:center;gap:10px;background:#f5f3ec;border:1px solid rgba(28,28,26,0.08);border-radius:10px;padding:12px 16px">
      <svg viewBox="0 0 20 20" width="16" height="16" style="stroke:rgba(28,28,26,0.4);fill:none;stroke-width:1.6;stroke-linecap:round"><circle cx="8.5" cy="8.5" r="6"></circle><path d="M13.2 13.2L17.5 17.5"></path></svg>
      <div style="font-size:14px;color:rgba(28,28,26,0.4)">{{searchPlaceholder}}</div>
    </div>
    <div style="flex:none;background:#1c1c1a;color:#f5f3ec;font-size:13.5px;font-weight:600;padding:12px 20px;border-radius:10px;cursor:pointer" style-hover="background:#31312d">Search</div>
  </div>

  <div style="background:#ffffff;border:1px solid rgba(28,28,26,0.08);border-radius:16px;overflow:hidden">
    <div style="{{gridStyleHeader}}">
      <sc-for list="{{columns}}" as="col" hint-placeholder-count="6">
        <div style="font-size:11.5px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(28,28,26,0.45);text-align:{{col.align}}">{{col.label}}</div>
      </sc-for>
    </div>
    <sc-for list="{{rows}}" as="row" hint-placeholder-count="8">
      <div style="{{gridStyleRow}}" style-hover="background:#faf9f5">
        <sc-for list="{{row.cells}}" as="cell" hint-placeholder-count="6">
          <div style="font-size:14px;text-align:{{cell.align}};display:flex;align-items:center;justify-content:{{cell.justify}}">
            <sc-if value="{{cell.isBadge}}" hint-placeholder-val="{{false}}">
              <span style="font-size:12px;font-weight:600;padding:5px 12px;border-radius:100px;background:{{cell.badgeBg}};color:{{cell.badgeColor}}">{{cell.text}}</span>
            </sc-if>
            <sc-if value="{{cell.isPlain}}" hint-placeholder-val="{{true}}">
              <span style="color:{{cell.color}};font-weight:{{cell.weight}}">{{cell.text}}</span>
            </sc-if>
          </div>
        </sc-for>
      </div>
    </sc-for>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
function cell(text, opts) {
  opts = opts || {};
  const badge = !!opts.badge;
  return {
    text,
    align: opts.align || 'left',
    justify: opts.align === 'right' ? 'flex-end' : (opts.align === 'center' ? 'center' : 'flex-start'),
    isBadge: badge,
    isPlain: !badge,
    badgeBg: opts.badgeBg || 'rgba(28,28,26,0.06)',
    badgeColor: opts.badgeColor || 'rgba(28,28,26,0.6)',
    color: opts.color || '#1c1c1a',
    weight: opts.weight || 400,
  };
}
const TONE = {
  success: { badgeBg: 'rgba(95,122,61,0.14)', badgeColor: '#5f7a3d' },
  warning: { badgeBg: 'rgba(201,143,58,0.16)', badgeColor: '#a06c1f' },
  danger:  { badgeBg: 'rgba(193,97,63,0.14)', badgeColor: '#b04e2c' },
  muted:   { badgeBg: 'rgba(28,28,26,0.07)', badgeColor: 'rgba(28,28,26,0.55)' },
};
function badge(text, tone){ return cell(text, Object.assign({ badge:true, align:'left' }, TONE[tone])); }
function price(text, accent){ return cell(text, { align:'right', weight:700, color: accent ? '#5f7a3d' : '#1c1c1a' }); }
function plain(text, muted, align){ return cell(text, { align: align||'left', color: muted ? 'rgba(28,28,26,0.55)' : '#1c1c1a' }); }

function row(cells){ return { cells }; }

class Component extends DCLogic {
  renderVals() {
    const key = (this.props.data && this.props.data.screen) || 'products';
    const s = SCREENS[key] || SCREENS.products;
    const colCount = s.columns.length;
    const gridTemplateColumns = s.columns.map(c => c.align === 'right' ? '1fr' : '1.4fr').join(' ');
    const gridStyleHeader = { display:'grid', gridTemplateColumns, gap:'20px', padding:'16px 24px', background:'#faf9f5', borderBottom:'1px solid rgba(28,28,26,0.08)' };
    const gridStyleRow = { display:'grid', gridTemplateColumns, gap:'20px', padding:'17px 24px', borderBottom:'1px solid rgba(28,28,26,0.06)' };
    return {
      title: s.title,
      subtitle: s.subtitle,
      hasAdd: true,
      addLabel: s.addLabel,
      searchPlaceholder: s.searchPlaceholder,
      hasKpis: !!s.kpis,
      kpis: s.kpis || [],
      kpiCount: s.kpis ? s.kpis.length : 4,
      columns: s.columns.map(c => ({ label: c.label, align: c.align || 'left' })),
      rows: s.rows,
      gridStyleHeader,
      gridStyleRow,
    };
  }
}

</script>
</body>
</html>
