<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>

<div style="font-family:'Inter',sans-serif;color:#1c1c1a">

  <div style="margin-bottom:28px">
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;letter-spacing:-0.01em">Point of Sale</div>
    <div style="font-size:14.5px;color:rgba(28,28,26,0.55);margin-top:6px">Process customer sales</div>
  </div>

  <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:20px;align-items:start">

    <div style="display:flex;flex-direction:column;gap:20px">
      <div style="background:#ffffff;border:1px solid rgba(28,28,26,0.08);border-radius:16px;padding:26px 28px">
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;margin-bottom:16px">Search Products</div>
        <div style="display:flex;gap:12px">
          <div style="flex:1;display:flex;align-items:center;gap:10px;background:#f5f3ec;border:1px solid rgba(28,28,26,0.08);border-radius:10px;padding:13px 16px">
            <svg viewBox="0 0 20 20" width="16" height="16" style="stroke:rgba(28,28,26,0.4);fill:none;stroke-width:1.6;stroke-linecap:round"><circle cx="8.5" cy="8.5" r="6"></circle><path d="M13.2 13.2L17.5 17.5"></path></svg>
            <div style="font-size:14px;color:rgba(28,28,26,0.4)">Scan barcode or search product…</div>
          </div>
          <div style="flex:none;background:#1c1c1a;color:#f5f3ec;font-size:13.5px;font-weight:600;padding:13px 24px;border-radius:10px;cursor:pointer" style-hover="background:#31312d">Search</div>
        </div>
      </div>

      <div style="background:#ffffff;border:1px solid rgba(28,28,26,0.08);border-radius:16px;padding:26px 28px">
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;margin-bottom:16px">Customer</div>
        <div style="display:flex;align-items:center;justify-content:space-between;background:#f5f3ec;border:1px solid rgba(28,28,26,0.08);border-radius:10px;padding:13px 16px;font-size:14px;font-weight:500">
          <div>Walk-in Customer (Default)</div>
          <svg viewBox="0 0 20 20" width="14" height="14" style="stroke:rgba(28,28,26,0.4);fill:none;stroke-width:1.8;stroke-linecap:round"><path d="M5 8l5 5 5-5"></path></svg>
        </div>
      </div>

      <div style="background:#ffffff;border:1px solid rgba(28,28,26,0.08);border-radius:16px;padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
        <sc-for list="{{quickItems}}" as="q" hint-placeholder-count="4">
          <div style="border:1px solid rgba(28,28,26,0.08);border-radius:12px;padding:16px 14px;cursor:pointer" style-hover="border-color:#c9d16b;background:#faf9f0">
            <div style="font-size:13.5px;font-weight:600;margin-bottom:6px">{{q.name}}</div>
            <div style="font-size:13px;color:#5f7a3d;font-weight:700">{{q.price}}</div>
          </div>
        </sc-for>
      </div>
    </div>

    <div style="background:#ffffff;border:1px solid rgba(28,28,26,0.08);border-radius:16px;padding:24px;position:sticky;top:0">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
        <svg viewBox="0 0 20 20" width="18" height="18" style="stroke:#1c1c1a;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round"><path d="M3 4h2l1.6 9.2a1.5 1.5 0 001.48 1.3h6.44a1.5 1.5 0 001.48-1.3L17.5 7H5.5"></path><path d="M8 17a1 1 0 100-2 1 1 0 000 2Z M14.5 17a1 1 0 100-2 1 1 0 000 2Z"></path></svg>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px">Cart</div>
      </div>

      <sc-for list="{{cartItems}}" as="c" hint-placeholder-count="2">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(28,28,26,0.07)">
          <div>
            <div style="font-size:13.5px;font-weight:600">{{c.name}}</div>
            <div style="font-size:12px;color:rgba(28,28,26,0.5);margin-top:2px">{{c.qty}} × {{c.unitPrice}}</div>
          </div>
          <div style="font-size:14px;font-weight:700">{{c.lineTotal}}</div>
        </div>
      </sc-for>

      <div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(28,28,26,0.08)">
        <div style="display:flex;justify-content:space-between;font-size:13.5px;color:rgba(28,28,26,0.6);margin-bottom:8px">
          <div>Subtotal</div><div>{{subtotal}}</div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13.5px;color:rgba(28,28,26,0.6);margin-bottom:12px">
          <div>Tax (8%)</div><div>{{tax}}</div>
        </div>
        <div style="display:flex;justify-content:space-between;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;margin-bottom:18px">
          <div>Total</div><div>{{total}}</div>
        </div>
        <div style="background:#c9d16b;color:#1c1c1a;text-align:center;font-weight:700;font-size:14.5px;padding:14px;border-radius:10px;cursor:pointer" style-hover="background:#bcc65c">Charge {{total}}</div>
      </div>
    </div>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const cartItems = [
      { name:'Windcheater Jacket 25618', qty:1, unitPrice:'$3,250.00', lineTotal:'$3,250.00' },
      { name:'Silk Polo', qty:2, unitPrice:'$340.00', lineTotal:'$680.00' },
    ];
    return {
      quickItems: [
        { name:'Windcheater Jacket', price:'$3,250.00' },
        { name:'Plain Formal Shirt', price:'$720.00' },
        { name:'Baggy Track Pant', price:'$1,880.00' },
        { name:'Silk Polo', price:'$340.00' },
      ],
      cartItems,
      subtotal: '$3,930.00',
      tax: '$314.40',
      total: '$4,244.40',
    };
  }
}

</script>
</body>
</html>
