<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>

<div style="font-family:'Inter',sans-serif;color:#1c1c1a">
  <div style="margin-bottom:28px">
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;letter-spacing:-0.01em">Reports</div>
    <div style="font-size:14.5px;color:rgba(28,28,26,0.55);margin-top:6px">Generate insights across your business</div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
    <sc-for list="{{reports}}" as="r" hint-placeholder-count="6">
      <div style="background:#ffffff;border:1px solid rgba(28,28,26,0.08);border-radius:16px;padding:24px;cursor:pointer" style-hover="border-color:#c9d16b">
        <div style="width:40px;height:40px;border-radius:10px;background:#f5f3ec;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
          <svg viewBox="0 0 20 20" width="19" height="19" style="stroke:#5f7a3d;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="{{r.iconPath}}"></path></svg>
        </div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16.5px;margin-bottom:8px">{{r.title}}</div>
        <div style="font-size:13.5px;color:rgba(28,28,26,0.55);line-height:1.5;margin-bottom:18px">{{r.desc}}</div>
        <div style="font-size:12.5px;font-weight:600;color:#5f7a3d">VIEW REPORT →</div>
      </div>
    </sc-for>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      reports: [
        { title:'Sales Report', desc:'Revenue, orders and trends across any date range.', iconPath:'M3 14l4.5-5 3 3 6-7 M12.5 5h4v4' },
        { title:'Inventory Report', desc:'Stock levels, reorder points and valuation.', iconPath:'M4 15V9M9.5 15V5M15 15v-3.5' },
        { title:'Purchases Report', desc:'Supplier spend and order fulfillment.', iconPath:'M5 6.5h10l-1 10.5H6L5 6.5Z M7.5 6.5v-1a2.5 2.5 0 015 0v1' },
        { title:'Expense Report', desc:'Operating costs broken down by category.', iconPath:'M10 2.5a7.5 7.5 0 100 15 7.5 7.5 0 000-15Z M10 6v8' },
        { title:'Customer Report', desc:'Repeat rate, lifetime value and top spenders.', iconPath:'M7 10a2.5 2.5 0 100-5 2.5 2.5 0 000 5Z M2.5 17c0-2.5 2-4.5 4.5-4.5s4.5 2 4.5 4.5' },
        { title:'Profit & Loss', desc:'Margins and profitability across the month.', iconPath:'M6 2.5h6l3 3v12H6v-15Z M8 10h5M8 13h5' },
      ],
    };
  }
}

</script>
</body>
</html>
